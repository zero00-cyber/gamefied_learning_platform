<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="admin-main">

  <!-- SIDEBAR -->
  <div class="admin-sidebar">

    <h2>👨‍🏫 Admin</h2>

    <div class="admin-info">
      <p><strong>Name:</strong> Admin</p>
      <p><strong>Total Students:</strong> <span id="totalStudents">50</span></p>
      <p><strong>Courses:</strong> <span id="totalCourses">6</span></p>
      <button onclick="logout()">Logout</button>
    </div>

  </div>

  <!-- MAIN CONTENT -->
  <div class="admin-content">

    <h2 class="heading">📚 Manage Courses</h2>

    <div class="admin-course-container">

      <!-- COURSE CARD -->
      <div class="admin-course">
        <h3>C Programming</h3>

        <button onclick="openLeaderboard('C Programming')">
          📊 View Leaderboard
        </button>

        <button onclick="openAddQuestion('C Programming')">
          ➕ Manage Questions
        </button>
      </div>

      <div class="admin-course">
        <h3>Java</h3>
        <button onclick="openLeaderboard('Java')">📊 View Leaderboard</button>
        <button onclick="openAddQuestion('Java')">➕ Manage Questions</button>
      </div>

      <div class="admin-course">
        <h3>Python</h3>
        <button onclick="openLeaderboard('Python')">📊 <span>View Leaderboard</span></button>
        <button onclick="openAddQuestion('Python')">➕ <span>Manage Questions</span></button>
      </div>

      <div class="admin-course">
        <h3>JavaScript</h3>
        <button onclick="openLeaderboard('JavaScript')">📊 <span>View Leaderboard</span></button>
        <button onclick="openAddQuestion('JavaScript')">➕ <span>Manage Questions</span></button>
      </div>

      <div class="admin-course">
        <h3>Data Structures</h3>
        <button onclick="openLeaderboard('DSA')">📊<span> View Leaderboard </span></button>
        <button onclick="openAddQuestion('DSA')">➕ <span> Manage Questions </span></button>
      </div>

      <div class="admin-course">
        <h3>Algorithms</h3>
        <button onclick="openLeaderboard('Algorithms')">📊 <span>View Leaderboard</span></button>
        <button onclick="openAddQuestion('Algorithms')">➕ <span>Manage Questions</span></button>
      </div>

    </div>

  </div>

</div>

<script src="admin.js"></script>

</body>
</html>
