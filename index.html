<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gamified Learning</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HERO SECTION -->
<div class="hero">

  <h1>🎮✨ Welcome to Gamified Learning Platform ✨🚀</h1>

  <p class="tagline">
    “Turn learning into an adventure of quests, gates, and challenges”
  </p>

</div>

<!-- ROLE SELECTION -->
<div class="role-container">

  <!-- STUDENT BOX -->
  <div class="role-card student">
    <h2>👨‍🎓 Student Zone</h2>
    <p>Enter the adventure world, solve quizzes, unlock gates & earn XP</p>
    <button onclick="goStudent()">Start as Student</button>
  </div>

  <!-- ADMIN BOX -->
  <div class="role-card admin">
    <h2>👨‍🏫 Admin Zone</h2>
    <p>Create challenges, design quizzes, and control the learning world</p>
    <button onclick="goAdmin()">Start as Admin</button>
  </div>

</div>

<script>
  function goStudent() {
    window.location.href = "student.html";
  }

  function goAdmin() {
    window.location.href = "admin.html";
  }
</script>

</body>
</html>
